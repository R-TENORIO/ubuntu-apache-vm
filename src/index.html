<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Servidor Web Apache - Projeto Acadêmico U4-A1">
    <title>Ubuntu Apache VM - Servidor Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e76f51 0%, #264653 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            color: #264653;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #e76f51;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .badge {
            display: inline-block;
            background: #2a9d8f;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin: 5px;
        }
        .info {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e9ecef;
        }
        .info p {
            color: #495057;
            line-height: 1.8;
            margin: 10px 0;
        }
        .author {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
            font-size: 0.9rem;
            color: #6c757d;
        }
        .status {
            background: #e7f5ff;
            border: 1px solid #74c0fc;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #1864ab;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ubuntu Apache VM</h1>
        <p class="subtitle">Servidor Web Ativo</p>
        
        <div class="badge">Ubuntu 24.04 LTS</div>
        <div class="badge">Apache 2.4</div>
        <div class="badge">Porta 80</div>
        
        <div class="status">
            O servidor Apache está funcionando corretamente!
        </div>
        
        <div class="info">
            <p><strong>Projeto Acadêmico U4-A1</strong></p>
            <p>Virtualização de Servidor Web com Ubuntu e Apache</p>
            <p>Curso de Engenharia de Software</p>
        </div>
        
        <div class="author">
            Autor: Rodrigo Tenorio | @R-TENORIO
        </div>
    </div>
</body>
</html>
